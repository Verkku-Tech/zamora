name: Deploy Docker

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  COMPOSE_PROJECT_NAME: fuerzacivil

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar Docker
        run: |
          docker --version
          docker compose version

      - name: Build imágenes
        run: docker compose build --pull

      - name: Desplegar stack
        run: docker compose up -d --remove-orphans

      - name: Esperar health check API
        run: |
          echo "Esperando que la API responda..."
          for i in $(seq 1 36); do
            if docker compose exec -T api curl -sf http://localhost:8080/health/live > /dev/null 2>&1; then
              echo "API alive (live)"
              break
            fi
            echo "Intento $i/36..."
            sleep 5
          done
          if ! docker compose exec -T api curl -sf http://localhost:8080/health/live > /dev/null 2>&1; then
            echo "Health live falló"
            docker compose ps
            docker compose logs api --tail 150
            exit 1
          fi
          echo "Verificando readiness (PostgreSQL)..."
          for i in $(seq 1 12); do
            if docker compose exec -T api curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API ready (health)"
              exit 0
            fi
            echo "Readiness $i/12..."
            sleep 5
          done
          echo "Health readiness falló"
          docker compose ps
          docker compose logs api --tail 150
          exit 1

      - name: Limpiar imágenes antiguas
        run: docker image prune -f

      - name: Estado final
        run: docker compose ps
